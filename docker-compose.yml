version: "3.9"

services:

  frontend:

    build:
      context: ./frontend

    container_name: mnemo-frontend

    ports:
      - "3000:3000"

    volumes:
      - ./frontend:/app
      - /app/node_modules

    depends_on:
      - backend

  backend:

    build:
      context: ./backend

    container_name: mnemo-backend

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    env_file:
      - ./backend/.env

    depends_on:
      postgres:
        condition: service_started

      redis:
        condition: service_started

  postgres:

    image: pgvector/pgvector:pg17

    container_name: mnemo-postgres

    restart: unless-stopped

    environment:

      POSTGRES_USER: postgres

      POSTGRES_PASSWORD: password

      POSTGRES_DB: mnemo

    ports:

      - "5432:5432"

    volumes:

      - postgres_data:/var/lib/postgresql/data

  redis:

    image: redis:7-alpine

    container_name: mnemo-redis

    restart: unless-stopped

    ports:

      - "6379:6379"

volumes:

  postgres_data: